{{- define "nav-top" -}}
<nav class="print:hidden">
  <ul>
    {{- template "nav-common" . -}}
    <li>
      <form class="print:hidden inline white-placeholder" target="_blank" action="https://www.google.com/search" hx-boost="false" enterkeyhint="search">
        <input type="search" name="q" size="14" placeholder="🔍 &nbsp; Search" class="px-3 btn-white">
        <input type="hidden" name="sitesearch" value="wynglet.chimbori.dev">
      </form>
    </li>
    <li>
      <a class="btn-github" href="https://github.com/chimbori/wynglet" target="_blank">
        <img src="/github.svg" class="inline mr-1 size-4" alt="GitHub" />
        <span hx-get="https://wynglet.chimbori.net/github/v1/chimbori/wynglet/stars" hx-trigger="load"></span> stars
      </a>
    </li>
  </ul>
</nav>
{{- end -}}

{{- define "nav-bottom" -}}
<nav class="print:hidden">
  <ul>
    {{ template "nav-common" . }}
  </ul>
</nav>
{{- end -}}

{{- define "nav-common" -}}
{{ range .Site.Nav }}
<li><a href="{{ .Url }}">{{- .Title -}}</a></li>
{{- end -}}
{{- end -}}
