debug: true
title: Wynglet
description: 'A self-hosted toolkit that brings dynamic capabilities to static websites. Add OpenGraph link preview images, forms, QR codes, and ratings without third-party services.'
urls:
  root: https://wynglet.chimbori.dev
  css: gen.min.css
  feed: //chimbori.com/feed.xml
  touch-icon: favicon.svg
  favicon: favicon.svg
theme-color: '#4743db'
nav:
  - url: /
    title: 🏠 Home
  - url: /installation
    title: Installation
  - url: /link-previews
    title: Open Graph
  - url: /forms
    title: Forms
  - url: /qr-codes
    title: QR Codes
  - url: /rating-widget
    title: Ratings
  - url: /dashboard
    title: Dashboard
imports:
  - link-preview
  - go-import
go-import:
  repo: wynglet.chimbori.dev
  git-url: https://github.com/chimbori/wynglet
  sub-dir: src
